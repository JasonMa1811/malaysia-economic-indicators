malaysia_indicators:
  target: dev
  outputs:
    dev:
      type: postgres
      host: "{{ env_var('POSTGRES_DATA_HOST', 'localhost') }}"
      port: "{{ env_var('POSTGRES_DATA_PORT', '5433') | as_number }}"
      user: "{{ env_var('POSTGRES_DATA_USER', 'malaysia') }}"
      pass: "{{ env_var('POSTGRES_DATA_PASSWORD', 'malaysia') }}"
      dbname: "{{ env_var('POSTGRES_DATA_DB', 'malaysia_indicators') }}"
      schema: public
      threads: 4
