# Malaysia Economic Indicators Tracker — Airflow (LocalExecutor)
#
# Usage:
#   docker compose up airflow-init   # one-time: creates the DB + admin user
#   docker compose up -d             # start everything
#   open http://localhost:8080  (user: airflow / pass: airflow)
#
# This uses LocalExecutor (Postgres + scheduler + api-server + dag-processor).
# No Celery/Redis/workers — this pipeline is a single weekly BashOperator
# task, so a distributed executor would just add containers with nothing
# to distribute.
#
# Power BI Desktop is NOT in here — it's Windows-only and can't run in a
# Linux container. It keeps running natively on your host and reads
# dashboard/malaysia_indicators.pbix, refreshing from data/processed/,
# which this compose file bind-mounts straight out of the container.

x-airflow-common:
  &airflow-common
  build: .
  env_file:
    - .env
  environment:
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: ${FERNET_KEY:-}
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/project/dags
    AIRFLOW__CORE__EXECUTION_API_SERVER_URL: 'http://airflow-apiserver:8080/execution/'
    AIRFLOW__API_AUTH__JWT_SECRET: ${AIRFLOW__API_AUTH__JWT_SECRET:-airflow_jwt_secret}
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: 'true'
    # Without this, Python buffers print() output and it can appear
    # out of order relative to subprocess (dbt) output in Airflow logs.
    PYTHONUNBUFFERED: '1'
    # Data warehouse for the pipeline output (separate from Airflow's own
    # metadata Postgres above). Used by etl/load/load_postgres.py.
    POSTGRES_DATA_HOST: postgres-data
    POSTGRES_DATA_PORT: 5432
    POSTGRES_DATA_USER: ${POSTGRES_DATA_USER:-malaysia}
    POSTGRES_DATA_PASSWORD: ${POSTGRES_DATA_PASSWORD:-malaysia}
    POSTGRES_DATA_DB: ${POSTGRES_DATA_DB:-malaysia_indicators}
  volumes:
    # Whole repo mounted read-write so the pipeline can write data/raw and
    # data/processed back to your host, and Power BI Desktop can read them.
    - .:/opt/airflow/project
    - ./logs:/opt/airflow/logs
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    &airflow-common-depends-on
    postgres:
      condition: service_healthy
    postgres-data:
      condition: service_healthy

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: always

  # Data warehouse for the pipeline's output — separate from the `postgres`
  # service above, which is Airflow's own internal metadata DB. Exposed on
  # host port 5433 so Power BI Desktop (running natively on Windows) can
  # connect to it directly.
  postgres-data:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_DATA_USER:-malaysia}
      POSTGRES_PASSWORD: ${POSTGRES_DATA_PASSWORD:-malaysia}
      POSTGRES_DB: ${POSTGRES_DATA_DB:-malaysia_indicators}
    ports:
      - "5433:5432"
    volumes:
      - postgres-data-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "malaysia"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: always

  # Web-based Postgres admin UI — browse/query postgres-data at
  # http://localhost:5050, no separate desktop app needed.
  pgadmin:
    image: dpage/pgadmin4:9.16
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@admin.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    volumes:
      - pgadmin-data:/var/lib/pgadmin
      - ./pgadmin/servers.json:/pgadmin4/servers.json:ro
    depends_on:
      postgres-data:
        condition: service_healthy
    restart: always

  airflow-apiserver:
    <<: *airflow-common
    command: api-server
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/api/v2/monitor/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    healthcheck:
      test: ["CMD-SHELL", 'airflow jobs check --job-type SchedulerJob --hostname "$${HOSTNAME}"']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-dag-processor:
    <<: *airflow-common
    command: dag-processor
    healthcheck:
      test: ["CMD-SHELL", 'airflow jobs check --job-type DagProcessorJob --hostname "$${HOSTNAME}"']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-triggerer:
    <<: *airflow-common
    command: triggerer
    healthcheck:
      test: ["CMD-SHELL", 'airflow jobs check --job-type TriggererJob --hostname "$${HOSTNAME}"']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        mkdir -v -p /opt/airflow/logs /opt/airflow/project/dags
        chown -R "${AIRFLOW_UID:-50000}:0" /opt/airflow/
        exec /entrypoint airflow version
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_MIGRATE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: ${_AIRFLOW_WWW_USER_USERNAME:-airflow}
      _AIRFLOW_WWW_USER_PASSWORD: ${_AIRFLOW_WWW_USER_PASSWORD:-airflow}
    user: "0:0"

volumes:
  postgres-db-volume:
  postgres-data-volume:
  pgadmin-data:
